<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0a0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="glow" cx="400" cy="315" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#4f46e5" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0a0a0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0b"/>

  <!-- Subtle glow behind logo -->
  <circle cx="400" cy="290" r="300" fill="url(#glow)"/>

  <!-- Logo Q - scaled to ~120px -->
  <g transform="translate(340, 230) scale(2.5)">
    <path d="M24 4C12.954 4 4 12.954 4 24s8.954 20 20 20c4.97 0 9.53-1.81 13.03-4.81l-5.66-5.66A12 12 0 1 1 36 24c0 1.61-.32 3.15-.89 4.55l5.72 5.72A19.91 19.91 0 0 0 44 24C44 12.954 35.046 4 24 4z" fill="url(#brand)"/>
    <path d="M28 28l12 12M40 40l-0.5-6.5M40 40l-6.5-0.5" stroke="url(#brand)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text: Qurl -->
  <text x="510" y="310" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff">Qurl</text>

  <!-- Subtitle -->
  <text x="510" y="360" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" fill="#a1a1aa">Shorten any URL in seconds</text>

  <!-- Gradient accent line at bottom -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#brand)"/>
</svg>
