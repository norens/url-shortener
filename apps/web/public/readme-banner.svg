<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" fill="none">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="glow" cx="440" cy="160" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#4f46e5" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0a0a0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="30%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="70%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" rx="12" fill="#0a0a0b"/>

  <!-- Subtle glow -->
  <circle cx="440" cy="160" r="260" fill="url(#glow)"/>

  <!-- Logo Q -->
  <g transform="translate(388, 108) scale(2.2)">
    <path d="M24 4C12.954 4 4 12.954 4 24s8.954 20 20 20c4.97 0 9.53-1.81 13.03-4.81l-5.66-5.66A12 12 0 1 1 36 24c0 1.61-.32 3.15-.89 4.55l5.72 5.72A19.91 19.91 0 0 0 44 24C44 12.954 35.046 4 24 4z" fill="url(#brand)"/>
    <path d="M28 28l12 12M40 40l-0.5-6.5M40 40l-6.5-0.5" stroke="url(#brand)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text: Qurl -->
  <text x="510" y="168" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="56" font-weight="700" fill="#ffffff">Qurl</text>

  <!-- Tagline -->
  <text x="510" y="205" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" fill="#a1a1aa">Open-source URL shortener with analytics</text>

  <!-- Gradient accent line at top -->
  <rect x="0" y="0" width="1280" height="3" rx="1.5" fill="url(#accent-line)"/>

  <!-- Gradient accent line at bottom -->
  <rect x="0" y="317" width="1280" height="3" rx="1.5" fill="url(#accent-line)"/>
</svg>
