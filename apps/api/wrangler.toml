name = "qurl-api"
# Set CLOUDFLARE_ACCOUNT_ID env var instead of hardcoding
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[[kv_namespaces]]
binding = "URL_CACHE"
id = "" # Create KV namespace: wrangler kv namespace create URL_CACHE

[env.dev]
[env.dev.vars]
ENVIRONMENT = "development"

[[env.dev.kv_namespaces]]
binding = "URL_CACHE"
id = "" # Create KV namespace: wrangler kv namespace create URL_CACHE --env dev

[[routes]]
pattern = "api.qurl.nazarf.dev"
custom_domain = true
